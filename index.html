<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#0a0a0f" />
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0a0a0f; font-family: 'Inter', system-ui, sans-serif; }
  input, select, button { font-family: inherit; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  /* date input dark styling */
  input[type=date] { color-scheme: dark; }
  ::-webkit-scrollbar { height: 0; width: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const DAYS = [
  { label: "LEGS A", accent: "#9C27B0", exercises: [
    { name: "Leg Press", sets: 4 }, { name: "Bulgarian Split Squat", sets: 3 },
    { name: "Step Ups", sets: 3 }, { name: "Leg Extension", sets: 3 },
    { name: "Leg Curl", sets: 2 }, { name: "Calf Raises (Machine)", sets: 4 },
    { name: "Preacher Curl", sets: 4 } ] },
  { label: "PUSH A", accent: "#2196F3", exercises: [
    { name: "Bench Press", sets: 4 }, { name: "DB Incline Press", sets: 3 },
    { name: "Barbell OHP", sets: 3 }, { name: "Cable Flys", sets: 3 },
    { name: "Pressdowns", sets: 4 }, { name: "Overhead Tricep Extension", sets: 3 },
    { name: "Upright Row", sets: 4 } ] },
  { label: "PULL A", accent: "#FF9800", exercises: [
    { name: "Barbell Row", sets: 4 }, { name: "Lat Pulldown", sets: 3 },
    { name: "Cable Row", sets: 3 }, { name: "Bayesian Curl", sets: 4 },
    { name: "Dumbbell Raise", sets: 3 }, { name: "Ab Crunch", sets: 3 },
    { name: "Cable Raise", sets: 2 } ] },
  { label: "REST", accent: "#4CAF50", isRest: true, exercises: [
    { name: "Run/Walk Intervals", note: "25–30 min · current 2:1 ratio" },
    { name: "Hip Flexor Stretch (Couch)", note: "3 × 45 sec each side" },
    { name: "Ankle Dorsiflexion Drill", note: "3 × 10–15 each side" },
    { name: "Thoracic Spine Rotation", note: "2 × 10 each side" },
    { name: "Glute Bridge Hold", note: "3 × 30 sec" },
    { name: "Deep Squat Hold", note: "3 × 30–45 sec" },
    { name: "Calf / Soleus Stretch", note: "2 × 45 sec each" } ] },
  { label: "LEGS B", accent: "#6A1B9A", exercises: [
    { name: "RDL", sets: 3 }, { name: "Hip Thrust", sets: 4 },
    { name: "Leg Press", sets: 3 }, { name: "Deadlift", sets: 3 },
    { name: "Leg Extension", sets: 2 }, { name: "Leg Curl", sets: 2 },
    { name: "Calf Raises (Machine)", sets: 4 }, { name: "Incline Curl", sets: 4 } ] },
  { label: "PUSH B", accent: "#1565C0", exercises: [
    { name: "Barbell OHP", sets: 3 }, { name: "Incline DB Bench", sets: 3 },
    { name: "Weighted Dips", sets: 3 }, { name: "DB Lateral Raise", sets: 5 },
    { name: "Overhead Tricep Extension", sets: 4 }, { name: "Cable Raise", sets: 2 },
    { name: "Upright Row", sets: 4 } ] },
  { label: "PULL B", accent: "#E65100", exercises: [
    { name: "Weighted Pullups", sets: 4 }, { name: "1 Arm DB Row", sets: 3 },
    { name: "Lat Pulldown", sets: 3 }, { name: "Bayesian Curl", sets: 4 },
    { name: "Cable Row", sets: 3 }, { name: "Rear Delt Fly", sets: 3 },
    { name: "Ab Crunch", sets: 3 } ] },
];

const STORAGE_KEY = "workout-sessions-v1";
const ALL_EXERCISES = [...new Set(DAYS.filter(d => !d.isRest).flatMap(d => d.exercises.map(e => e.name)))].sort();

const todayStr = () => new Date().toISOString().slice(0, 10);
const fmtDate = s => new Date(s + "T00:00:00").toLocaleDateString("en-NZ", { day: "numeric", month: "short" });

// ---- Simple SVG line chart (no dependencies) ----
function LineChart({ data, color, valueKey }) {
  const W = 320, H = 200, pad = 34;
  if (data.length === 0) return null;
  const vals = data.map(d => d[valueKey]);
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) { min = min - 1; max = max + 1; }
  const range = max - min;
  const plotW = W - pad * 2, plotH = H - pad * 2;
  const x = i => data.length === 1 ? W / 2 : pad + (i / (data.length - 1)) * plotW;
  const y = v => pad + plotH - ((v - min) / range) * plotH;
  const pts = data.map((d, i) => `${x(i)},${y(d[valueKey])}`).join(" ");
  const ticks = 4;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {Array.from({ length: ticks + 1 }).map((_, t) => {
        const v = min + (range * t) / ticks;
        const yy = y(v);
        return (
          <g key={t}>
            <line x1={pad} y1={yy} x2={W - pad} y2={yy} stroke="#1e1e2e" strokeWidth="1" />
            <text x={pad - 6} y={yy + 3} fill="#555" fontSize="9" textAnchor="end">{Math.round(v)}</text>
          </g>
        );
      })}
      <polyline fill="none" stroke={color} strokeWidth="2" points={pts} strokeLinejoin="round" strokeLinecap="round" />
      {data.map((d, i) => (
        <g key={i}>
          <circle cx={x(i)} cy={y(d[valueKey])} r="3.5" fill={color} />
          {(data.length <= 8 || i % Math.ceil(data.length / 6) === 0 || i === data.length - 1) && (
            <text x={x(i)} y={H - pad + 16} fill="#666" fontSize="9" textAnchor="middle">{d.label}</text>
          )}
        </g>
      ))}
    </svg>
  );
}

function App() {
  const [tab, setTab] = useState("log");
  const [sessions, setSessions] = useState([]);
  const [saved, setSaved] = useState(false);
  const [dayIdx, setDayIdx] = useState(0);
  const [date, setDate] = useState(todayStr());
  const [entry, setEntry] = useState({});
  const [progExercise, setProgExercise] = useState(ALL_EXERCISES[0]);
  const day = DAYS[dayIdx];

  useEffect(() => {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) setSessions(JSON.parse(stored));
    } catch (e) {}
  }, []);

  useEffect(() => {
    const existing = sessions.find(s => s.date === date && s.label === day.label);
    const fresh = {};
    if (day.isRest) {
      day.exercises.forEach(ex => {
        fresh[ex.name] = !!(existing && existing.exercises.find(e => e.name === ex.name));
      });
    } else {
      day.exercises.forEach(ex => {
        if (existing) {
          const found = existing.exercises.find(e => e.name === ex.name);
          fresh[ex.name] = found
            ? Array.from({ length: ex.sets }, (_, i) => found.sets[i] || { weight: "", reps: "" })
            : Array.from({ length: ex.sets }, () => ({ weight: "", reps: "" }));
        } else {
          fresh[ex.name] = Array.from({ length: ex.sets }, () => ({ weight: "", reps: "" }));
        }
      });
    }
    setEntry(fresh);
  }, [dayIdx, date, sessions]);

  const lastSession = useMemo(() => {
    const prior = sessions.filter(s => s.label === day.label && s.date < date).sort((a, b) => a.date < b.date ? 1 : -1);
    return prior[0] || null;
  }, [sessions, day.label, date]);

  const lastSetsFor = name => {
    if (!lastSession) return null;
    const ex = lastSession.exercises.find(e => e.name === name);
    return ex ? ex.sets : null;
  };

  const updateSet = (name, idx, field, val) => {
    setEntry(prev => ({ ...prev, [name]: prev[name].map((s, i) => i === idx ? { ...s, [field]: val } : s) }));
    setSaved(false);
  };

  const saveSession = () => {
    let exercises;
    if (day.isRest) {
      exercises = day.exercises.filter(ex => entry[ex.name]).map(ex => ({ name: ex.name, done: true }));
    } else {
      exercises = day.exercises.map(ex => ({
        name: ex.name,
        sets: entry[ex.name].filter(s => s.weight !== "" || s.reps !== "")
      })).filter(ex => ex.sets.length > 0);
    }
    if (exercises.length === 0) return;
    const newSession = { date, label: day.label, exercises, isRest: !!day.isRest };
    const others = sessions.filter(s => !(s.date === date && s.label === day.label));
    const updated = [...others, newSession];
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(updated)); } catch (e) {}
    setSessions(updated);
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const chartData = useMemo(() => {
    return sessions
      .filter(s => s.exercises.some(e => e.name === progExercise))
      .map(s => {
        const ex = s.exercises.find(e => e.name === progExercise);
        const valid = ex.sets.filter(set => set.weight !== "" && !isNaN(parseFloat(set.weight)));
        if (valid.length === 0) return null;
        const top = valid.reduce((a, b) => parseFloat(b.weight) > parseFloat(a.weight) ? b : a);
        const vol = valid.reduce((sum, set) => sum + parseFloat(set.weight) * (parseInt(set.reps) || 0), 0);
        return { date: s.date, topWeight: parseFloat(top.weight), volume: vol, label: fmtDate(s.date) };
      })
      .filter(Boolean)
      .sort((a, b) => a.date < b.date ? -1 : 1);
  }, [sessions, progExercise]);

  const exportCSV = () => {
    const rows = [["Date", "Day", "Exercise", "Set", "Weight (kg)", "Reps"]];
    [...sessions].sort((a, b) => a.date < b.date ? -1 : 1).forEach(s => {
      if (s.isRest) {
        s.exercises.forEach(ex => rows.push([s.date, s.label, ex.name, "-", "completed", "-"]));
      } else {
        s.exercises.forEach(ex => ex.sets.forEach((set, i) => rows.push([s.date, s.label, ex.name, i + 1, set.weight, set.reps])));
      }
    });
    const csv = rows.map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `workout-log-${todayStr()}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={S.eyebrow}>Danyal — Training Log</div>
        <div style={S.title}>Workout Tracker</div>
      </div>

      <div style={S.tabBar}>
        {[["log","Log"],["progress","Progress"],["export","Export"]].map(([id,lbl]) => (
          <button key={id} onClick={() => setTab(id)} style={{ ...S.tab, ...(tab===id?S.tabActive:{}) }}>{lbl}</button>
        ))}
      </div>

      {tab === "log" && (
        <div style={S.body}>
          <div style={S.dayRow}>
            {DAYS.map((d, i) => (
              <button key={d.label} onClick={() => setDayIdx(i)} style={{
                ...S.dayChip,
                borderColor: dayIdx===i ? d.accent : "#1e1e2e",
                background: dayIdx===i ? d.accent+"22" : "#111118",
                color: dayIdx===i ? d.accent : "#666",
              }}>{d.label}</button>
            ))}
          </div>

          <div style={S.dateRow}>
            <label style={S.dateLabel}>Session date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={S.dateInput} />
          </div>

          {lastSession && !day.isRest && (
            <div style={S.lastBanner}>Last <span style={{color:day.accent,fontWeight:600}}>{day.label}</span> session: {fmtDate(lastSession.date)}</div>
          )}

          {day.isRest ? day.exercises.map(ex => (
            <div key={ex.name} style={S.exCard}>
              <label style={{display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
                <input type="checkbox" checked={!!entry[ex.name]}
                  onChange={e => { setEntry(prev => ({...prev,[ex.name]:e.target.checked})); setSaved(false); }}
                  style={{width:22,height:22,accentColor:day.accent,cursor:"pointer",flexShrink:0}} />
                <div style={{flex:1}}>
                  <div style={{...S.exName,marginBottom:2,textDecoration:entry[ex.name]?"line-through":"none",opacity:entry[ex.name]?0.5:1}}>{ex.name}</div>
                  <div style={{fontSize:12,color:"#666"}}>{ex.note}</div>
                </div>
              </label>
            </div>
          )) : day.exercises.map(ex => {
            const lastSets = lastSetsFor(ex.name);
            return (
              <div key={ex.name} style={S.exCard}>
                <div style={S.exName}>{ex.name}</div>
                <div style={S.setGrid}>
                  <div style={S.setHeadRow}>
                    <span style={S.setHeadCell}>Set</span>
                    <span style={S.setHeadCell}>Weight</span>
                    <span style={S.setHeadCell}>Reps</span>
                    <span style={{...S.setHeadCell,color:"#444"}}>Last wk</span>
                  </div>
                  {(entry[ex.name]||[]).map((s, i) => (
                    <div key={i} style={S.setInputRow}>
                      <span style={S.setNum}>{i+1}</span>
                      <input type="number" inputMode="decimal" placeholder="kg" value={s.weight}
                        onChange={e => updateSet(ex.name,i,"weight",e.target.value)} style={S.numInput} />
                      <input type="number" inputMode="numeric" placeholder="reps" value={s.reps}
                        onChange={e => updateSet(ex.name,i,"reps",e.target.value)} style={S.numInput} />
                      <span style={S.lastCell}>{lastSets && lastSets[i] ? `${lastSets[i].weight||"–"}×${lastSets[i].reps||"–"}` : "—"}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}

          <button onClick={saveSession} style={{...S.saveBtn,background:saved?"#1e5c35":day.accent}}>{saved?"Saved ✓":"Save session"}</button>
        </div>
      )}

      {tab === "progress" && (
        <div style={S.body}>
          <label style={S.dateLabel}>Exercise</label>
          <select value={progExercise} onChange={e => setProgExercise(e.target.value)} style={S.select}>
            {ALL_EXERCISES.map(ex => <option key={ex} value={ex}>{ex}</option>)}
          </select>
          {chartData.length === 0 ? (
            <div style={S.empty}>No data logged for {progExercise} yet.</div>
          ) : (
            <React.Fragment>
              <div style={S.chartLabel}>Top set weight (kg)</div>
              <div style={S.chartWrap}><LineChart data={chartData} color="#4CAF50" valueKey="topWeight" /></div>
              <div style={S.chartLabel}>Total volume (kg × reps)</div>
              <div style={S.chartWrap}><LineChart data={chartData} color="#2196F3" valueKey="volume" /></div>
            </React.Fragment>
          )}
        </div>
      )}

      {tab === "export" && (
        <div style={S.body}>
          <div style={S.exportCard}>
            <div style={S.exportStat}>{sessions.length}</div>
            <div style={S.exportStatLabel}>sessions logged</div>
          </div>
          <div style={S.exportNote}>Download all your data as a CSV — opens in Excel or Google Sheets.</div>
          <button onClick={exportCSV} disabled={sessions.length===0}
            style={{...S.saveBtn,background:sessions.length===0?"#222":"#1e5c35",opacity:sessions.length===0?0.5:1}}>Download CSV</button>
          {sessions.length===0 && <div style={S.empty}>Nothing to export yet.</div>}
        </div>
      )}

      <div style={S.foot}>Data is saved on this device. Export to CSV regularly as a backup.</div>
    </div>
  );
}

const S = {
  app: { maxWidth: 760, margin: "0 auto", minHeight: "100vh", color: "#e8e8f0", paddingBottom: 30 },
  header: { padding: "26px 22px 18px", borderBottom: "1px solid #1e1e2e", background: "linear-gradient(180deg,#0d0d1a,#0a0a0f)" },
  eyebrow: { fontSize: 11, letterSpacing: 3, color: "#555570", textTransform: "uppercase", marginBottom: 6 },
  title: { fontSize: 23, fontWeight: 700, letterSpacing: "-0.5px" },
  tabBar: { display: "flex", gap: 6, padding: "14px 22px", borderBottom: "1px solid #1e1e2e" },
  tab: { flex: 1, padding: "11px 0", borderRadius: 8, border: "1px solid #1e1e2e", background: "#111118", color: "#666", fontSize: 13, fontWeight: 600, cursor: "pointer" },
  tabActive: { background: "#16213e", borderColor: "#0f3460", color: "#fff" },
  body: { padding: 22 },
  dayRow: { display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 18 },
  dayChip: { padding: "8px 12px", borderRadius: 8, border: "1.5px solid", fontSize: 12, fontWeight: 600, cursor: "pointer" },
  dateRow: { display: "flex", alignItems: "center", gap: 12, marginBottom: 16 },
  dateLabel: { fontSize: 11, letterSpacing: 1.5, color: "#666", textTransform: "uppercase" },
  dateInput: { background: "#111118", border: "1px solid #1e1e2e", borderRadius: 8, color: "#e8e8f0", padding: "8px 10px", fontSize: 13 },
  lastBanner: { fontSize: 12, color: "#888", padding: "10px 12px", background: "#0d0d18", border: "1px solid #1e1e2e", borderRadius: 8, marginBottom: 16 },
  exCard: { background: "#111118", border: "1px solid #1e1e2e", borderRadius: 12, padding: 16, marginBottom: 12 },
  exName: { fontSize: 15, fontWeight: 600, marginBottom: 12 },
  setGrid: { display: "flex", flexDirection: "column", gap: 7 },
  setHeadRow: { display: "grid", gridTemplateColumns: "28px 1fr 1fr 64px", gap: 8, alignItems: "center" },
  setHeadCell: { fontSize: 10, letterSpacing: 1, color: "#555", textTransform: "uppercase" },
  setInputRow: { display: "grid", gridTemplateColumns: "28px 1fr 1fr 64px", gap: 8, alignItems: "center" },
  setNum: { fontSize: 13, color: "#666", textAlign: "center", fontWeight: 600 },
  numInput: { background: "#0a0a0f", border: "1px solid #222", borderRadius: 7, color: "#fff", padding: "10px", fontSize: 16, width: "100%", textAlign: "center" },
  lastCell: { fontSize: 12, color: "#555", textAlign: "right" },
  saveBtn: { width: "100%", padding: "15px 0", borderRadius: 10, border: "none", color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 8 },
  select: { width: "100%", background: "#111118", border: "1px solid #1e1e2e", borderRadius: 8, color: "#e8e8f0", padding: "12px", fontSize: 15, marginTop: 8, marginBottom: 20 },
  chartLabel: { fontSize: 11, letterSpacing: 1.5, color: "#666", textTransform: "uppercase", marginBottom: 8, marginTop: 8 },
  chartWrap: { background: "#0d0d16", border: "1px solid #1e1e2e", borderRadius: 12, padding: 12, marginBottom: 22 },
  empty: { fontSize: 13, color: "#666", padding: "20px 0", textAlign: "center" },
  exportCard: { background: "#111118", border: "1px solid #1e1e2e", borderRadius: 12, padding: 24, textAlign: "center", marginBottom: 16 },
  exportStat: { fontSize: 44, fontWeight: 700, color: "#4CAF50" },
  exportStatLabel: { fontSize: 12, letterSpacing: 1.5, color: "#666", textTransform: "uppercase", marginTop: 4 },
  exportNote: { fontSize: 13, color: "#888", lineHeight: 1.6, marginBottom: 18 },
  foot: { fontSize: 11, color: "#444", textAlign: "center", padding: "10px 22px 0" },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
